<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizApp</title>
    <link rel="stylesheet" href="/QuizApp.css" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .app-header {
            text-align: center;
            margin-bottom: 2rem;
        }

            .app-header h1 {
                font-size: 2.5rem;
                font-weight: 800;
                color: #e94560;
                letter-spacing: 2px;
            }

            .app-header p {
                color: #a0a0c0;
                margin-top: 0.25rem;
            }

        .screen {
            width: 100%;
            max-width: 680px;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 4rem;
        }

        .app-title {
            font-size: 2rem;
            font-weight: 800;
            color: #e94560;
        }

        .app-sub {
            color: #a0a0c0;
            margin-bottom: 1rem;
        }

        .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

            .form-field label {
                font-size: 0.8rem;
                font-weight: 600;
                color: #a0a0c0;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

        .form-input,
        .form-select {
            padding: 0.7rem 1rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }

            .form-input::placeholder {
                color: #606080;
            }

            .form-input:focus, .form-select:focus {
                border-color: #e94560;
            }

            .form-select option {
                background: #1a1a2e;
            }

        .error-box {
            background: rgba(255,56,96,0.15);
            border: 1px solid #ff3860;
            color: #ff3860;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
            width: 100%;
        }

            .btn:hover {
                opacity: 0.88;
            }

            .btn:active {
                transform: scale(0.96);
            }

        .btn-start {
            background: #e94560;
            color: white;
            margin-top: 0.5rem;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .btn-next {
            background: #e94560;
            color: white;
            margin-top: 1rem;
            width: 100%;
        }

        .loading-screen {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .question-screen {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 680px;
        }

        .progress-wrap {
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a0a0c0;
            margin-bottom: 0.4rem;
        }

        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg,#e94560,#f5a623);
            border-radius: 99px;
            transition: width 0.4s;
        }

        .timer-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .timer-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: #e94560;
            flex-shrink: 0;
        }

            .timer-circle.urgent {
                border-color: #ff3860;
                color: #ff3860;
                animation: pulse 0.5s infinite;
            }

        @keyframes pulse {
            0%,100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.08)
            }
        }

        .timer-bar-wrap {
            flex: 1;
        }

        .timer-bar-track {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: #e94560;
            border-radius: 99px;
            transition: width 1s linear;
        }

        .question-meta {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 0.25rem 0.7rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-easy {
            background: rgba(72,199,142,0.2);
            color: #48c78e;
        }

        .badge-medium {
            background: rgba(245,166,35,0.2);
            color: #f5a623;
        }

        .badge-hard {
            background: rgba(233,69,96,0.2);
            color: #e94560;
        }

        .badge-cat {
            background: rgba(100,149,237,0.2);
            color: #6495ed;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            color: #fff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-option {
            width: 100%;
            text-align: left;
            padding: 1rem 1.25rem;
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

            .btn-option:hover {
                background: rgba(233,69,96,0.2);
                border-color: #e94560;
                transform: translateX(4px);
            }

            .btn-option.correct {
                background: rgba(72,199,142,0.25);
                border-color: #48c78e;
                color: #48c78e;
                cursor: default;
            }

            .btn-option.dimmed {
                opacity: 0.4;
                cursor: default;
            }

        .option-letter {
            font-weight: 800;
            color: #e94560;
            min-width: 20px;
        }

        .feedback {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 1rem;
        }

        .correct-feedback {
            background: rgba(72,199,142,0.15);
            border: 1px solid #48c78e;
            color: #48c78e;
        }

        .wrong-feedback {
            background: rgba(255,56,96,0.15);
            border: 1px solid #ff3860;
            color: #ff3860;
        }

        .result-screen {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 680px;
        }

        .result-emoji {
            font-size: 5rem;
            text-align: center;
            margin: 1rem 0;
        }

        .result-score {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            color: #e94560;
        }

        .result-grade {
            text-align: center;
            color: #a0a0c0;
            margin-bottom: 2rem;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #e0e0e0;
        }

        .stat-lbl {
            display: block;
            font-size: 0.75rem;
            color: #a0a0c0;
            margin-top: 0.25rem;
        }

        .lb-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 1.5rem 0 0.75rem;
            color: #e0e0e0;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
        }

            .lb-table th {
                font-size: 0.75rem;
                text-transform: uppercase;
                color: #606080;
                padding: 0.5rem 0.75rem;
                text-align: left;
            }

            .lb-table td {
                padding: 0.6rem 0.75rem;
                border-top: 1px solid rgba(255,255,255,0.06);
                font-size: 0.9rem;
            }

        .rank-gold {
            color: #f5a623;
            font-weight: 800;
        }

        .rank-silver {
            color: #a0a0c0;
            font-weight: 700;
        }

        .rank-bronze {
            color: #cd7f32;
            font-weight: 700;
        }

        .empty-lb {
            text-align: center;
            color: #606080;
            padding: 1rem;
        }
    </style>
</head>
<body>


    <div id="main"></div>
    <script type="module" src="/QuizApp.min.js"></script>

</body>
</html>
