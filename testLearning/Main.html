<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizApp</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* ── SCREENS ── */
        .screen {
            width: 100%;
            max-width: 660px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

      
        .welcome-screen {
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e94560;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }

        .app-sub {
            color: #707090;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: left;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

            .form-field label {
                font-size: 0.75rem;
                font-weight: 700;
                color: #8080a0;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }

        .form-input,
        .form-select {
            padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

            .form-input::placeholder {
                color: #505070;
            }

            .form-input:focus,
            .form-select:focus {
                border-color: #e94560;
            }

            .form-select option {
                background: #1a1a2e;
            }

        .error-box {
            background: rgba(255,56,96,0.12);
            border: 1px solid #ff3860;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            color: #ff6080;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

            .btn:hover {
                opacity: 0.85;
            }

            .btn:active {
                transform: scale(0.97);
            }

        .btn-start {
            background: #e94560;
            color: white;
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }

        .btn-next {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.15);
            width: 100%;
            margin-top: 1rem;
            padding: 0.85rem;
        }


        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 4rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        .question-screen {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            padding: 1.75rem;
        }

        .progress-wrap {
            margin-bottom: 1.25rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #8080a0;
            margin-bottom: 0.4rem;
        }

        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #f5a623);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .timer-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .timer-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            font-weight: 800;
            color: #e94560;
            flex-shrink: 0;
        }

            .timer-circle.urgent {
                border-color: #ff3860;
                color: #ff3860;
                animation: pulse 0.5s infinite alternate;
            }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        .timer-bar-wrap {
            flex: 1;
        }

        .timer-bar-track {
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: #e94560;
            border-radius: 99px;
            transition: width 1s linear;
        }

        .question-meta {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 0.2rem 0.65rem;
            border-radius: 99px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-easy {
            background: rgba(72,199,142,0.18);
            color: #48c78e;
        }

        .badge-medium {
            background: rgba(245,166,35,0.18);
            color: #f5a623;
        }

        .badge-hard {
            background: rgba(233,69,96,0.18);
            color: #e94560;
        }

        .badge-cat {
            background: rgba(100,149,237,0.18);
            color: #6495ed;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.55;
            color: #ffffff;
            margin-bottom: 1.25rem;
        }

        .feedback {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .correct-feedback {
            background: rgba(72,199,142,0.15);
            border: 1px solid #48c78e;
            color: #48c78e;
        }

        .wrong-feedback {
            background: rgba(255,56,96,0.15);
            border: 1px solid #ff3860;
            color: #ff6080;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .btn-option {
            width: 100%;
            text-align: left;
            padding: 0.85rem 1.1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

            .btn-option:hover:not([disabled]) {
                background: rgba(233,69,96,0.18);
                border-color: #e94560;
                transform: translateX(3px);
            }

            .btn-option.correct {
                background: rgba(72,199,142,0.2);
                border-color: #48c78e;
                color: #48c78e;
            }

            .btn-option.dimmed {
                opacity: 0.4;
                cursor: default;
            }

            .btn-option[disabled] {
                cursor: default;
            }

        .option-letter {
            font-weight: 800;
            color: #e94560;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

    
        .result-screen {
            text-align: center;
        }

        .result-emoji {
            font-size: 5rem;
            margin-bottom: 0.75rem;
        }

        .result-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e94560;
        }

        .result-grade {
            color: #8080a0;
            margin-bottom: 1.75rem;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-val {
            font-size: 1.6rem;
            font-weight: 800;
            color: #e0e0e0;
        }

        .stat-lbl {
            font-size: 0.72rem;
            color: #8080a0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .lb-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 1.5rem 0 0.75rem;
            text-align: left;
        }

        .empty-lb {
            color: #606080;
            text-align: center;
            padding: 1rem;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

            .lb-table th {
                text-align: left;
                padding: 0.5rem 0.75rem;
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #606080;
            }

            .lb-table td {
                padding: 0.55rem 0.75rem;
                border-top: 1px solid rgba(255,255,255,0.06);
            }

            .lb-table tr:hover td {
                background: rgba(255,255,255,0.04);
            }

        .rank-gold {
            color: #f5a623;
            font-weight: 800;
        }

        .rank-silver {
            color: #a0a0b0;
            font-weight: 700;
        }

        .rank-bronze {
            color: #cd7f32;
            font-weight: 700;
        }
    </style>
</head>
<body>

  
    <div id="main"></div>

</body>
</html>
